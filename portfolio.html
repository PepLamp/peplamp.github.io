<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <style>
    @font-face {
      font-family: "Duke Charming DEMO";
      src: url("./source/Duke Charming DEMO.otf") format("opentype");
    }

    :root {
      --bg: #d9d1bf;
      --col: #837A90;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100vh;
      background: var(--bg);
    }

    body {
      display: flex;
      justify-content: space-evenly;
      align-items: stretch;
      overflow-x: hidden;
      padding: 0;
      box-sizing: border-box;
      gap: 0;
    }

    .column {
      width: 15vw;
      flex: 0 0 15vw;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 1.5vh;
      transition: width 0.25s ease, flex-basis 0.25s ease, opacity 0.25s ease;
      position: relative;
    }

    .column.active {
      width: 20vw;
      flex-basis: 20vw;
    }

    .photo-wrap {
      position: relative;
      width: 100%;
    }

    .column img {
      width: 100%;
      height: auto;
      display: block;
      transition: filter 0.2s ease, opacity 0.2s ease, transform 0.2s ease;
    }

    .column.active img {
      filter: grayscale(0.35) brightness(0.92);
      opacity: 0.7;
    }

    .column.active img.is-hovered {
      filter: none;
      opacity: 1;
      transform: scale(1.01);
    }

    .photo-label {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      background: rgba(131, 122, 144, 0.75);
      color: var(--bg);
      font-family: "Duke Charming DEMO", serif;
      font-size: 1.5rem;
      line-height: 1;
      padding: 0.45rem 0.5rem 0.35rem;
      box-sizing: border-box;
      opacity: 0;
      transform: translateY(0.25rem);
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
      z-index: 2;
      text-align: center;
    }

    .photo-wrap.show-label .photo-label {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="column" id="column-1"></div>
  <div class="column" id="column-2"></div>
  <div class="column" id="column-3"></div>
  <div class="column" id="column-4"></div>

  <script>
    const photos = [
      "source/portfolio/Crystallized.png",
      "source/portfolio/Happy New Year.png",
      "source/portfolio/Mindfuck.JPG",
      "source/portfolio/Unity.png",
      "source/portfolio/We Are A People's Company.JPG",
    ].sort((a, b) => a.localeCompare(b, undefined, { sensitivity: "base" }));

    const columns = [
      document.getElementById("column-1"),
      document.getElementById("column-2"),
      document.getElementById("column-3"),
      document.getElementById("column-4"),
    ];

    let activeImage = null;
    let activeWrap = null;

    function setActiveImage(image, column, wrap) {
      activeImage = image;
      activeWrap = wrap;

      columns.forEach((col) => {
        col.classList.toggle("active", col === column);
      });

      document.body.classList.toggle("has-hovered-column", Boolean(column));

      columns.forEach((col) => {
        col.querySelectorAll("img").forEach((img) => img.classList.remove("is-hovered"));
        col.querySelectorAll(".photo-wrap").forEach((el) => el.classList.remove("show-label"));
      });

      if (image) {
        image.classList.add("is-hovered");
      }

      if (wrap) {
        wrap.classList.add("show-label");
      }
    }

    photos.forEach((photo, index) => {
      const targetColumn = columns[index % columns.length];

      const wrap = document.createElement("div");
      wrap.className = "photo-wrap";

      const img = document.createElement("img");
      img.src = photo;
      img.alt = photo.split("/").pop()?.replace(/\.[^.]+$/, "") || "portfolio photo";

      const label = document.createElement("div");
      label.className = "photo-label";
      label.textContent = img.alt;

      img.addEventListener("mouseenter", () => setActiveImage(img, targetColumn, wrap));
      img.addEventListener("mouseleave", () => {
        if (activeImage === img) {
          setActiveImage(null, null, null);
        }
      });

      wrap.appendChild(img);
      wrap.appendChild(label);
      targetColumn.appendChild(wrap);
    });

    document.body.addEventListener("mouseleave", () => setActiveImage(null, null, null));
  </script>
</body>
</html>
